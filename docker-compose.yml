services:
  redis:
    image: redis:7-alpine
    container_name: guardrail-redis
    command: redis-server --appendonly no --save "" --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 10

  # Optional: run the Express example behind the same network.
  # Bring it up with:  docker compose --profile demo up
  gateway:
    profiles: ["demo"]
    build: .
    container_name: guardrail-gateway
    environment:
      REDIS_URL: redis://redis:6379
      PORT: "3000"
    ports:
      - "3000:3000"
    depends_on:
      redis:
        condition: service_healthy
